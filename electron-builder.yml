appId: com.awslens.desktop
productName: AWS Lens
generateUpdatesFilesForAllChannels: true

directories:
  output: release
  buildResources: assets

files:
  - out/**
  - assets/**
  - node_modules/**/*
  - package.json

asar: false

publish:
  provider: github
  owner: BoraKostem
  repo: AWS-Lens

win:
  artifactName: AWS-Lens-Setup-${version}.${ext}
  target:
    - nsis
  icon: assets/aws-lens-logo.ico
  signtoolOptions:
    sign: build/win-custom-sign.cjs

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  artifactName: AWS-Lens-${version}-${arch}.${ext}
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  icon: assets/aws-lens-logo.icns
  hardenedRuntime: false
  gatekeeperAssess: false
  notarize: false

linux:
  artifactName: aws-lens_${version}_${arch}.${ext}
  category: Development
  maintainer: Bora Kostem <BoraKostem@users.noreply.github.com>
  target:
    - deb
    - AppImage
  icon: assets/aws-lens-logo.png
