appId: com.awslens.desktop
productName: AWS Lens

directories:
  output: release
  buildResources: assets

files:
  - out/**
  - assets/**
  - node_modules/**/*
  - package.json

asar: false

win:
  target:
    - nsis
  icon: assets/aws-lens-logo.ico
  signtoolOptions:
    sign: build/win-custom-sign.cjs

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  icon: assets/aws-lens-logo.icns
  hardenedRuntime: false
  gatekeeperAssess: false
  notarize: false

linux:
  category: Development
  maintainer: Bora Kostem <BoraKostem@users.noreply.github.com>
  target:
    - deb
    - AppImage
  icon: assets/aws-lens-logo.png
