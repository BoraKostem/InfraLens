name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Skip Electron binary download — not needed for typecheck/test/server build
env:
  ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

jobs:
  typecheck:
    name: Type check
    runs-on: [self-hosted, k3s, linux, amd64]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

  test:
    name: Unit tests
    runs-on: [self-hosted, k3s, linux, amd64]
    needs: typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

  build-push:
    name: Build & push to Harbor
    runs-on: [self-hosted, k3s, linux, amd64]
    needs: [typecheck, test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.k3s.internal.strommen.systems
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          provenance: false
          push: true
          tags: |
            harbor.k3s.internal.strommen.systems/staging/aws-lens:sha-${{ github.sha }}
            harbor.k3s.internal.strommen.systems/staging/aws-lens:latest
