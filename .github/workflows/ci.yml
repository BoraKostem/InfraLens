name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Skip Electron binary download — not needed for typecheck/test/server build
env:
  ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

  build:
    name: Build web server
    runs-on: ubuntu-latest
    needs: [typecheck, test]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:web

      - name: Verify build output
        run: |
          test -f out/server/index.mjs || (echo "Server build missing" && exit 1)
          test -d out/renderer/public/renderer || (echo "Renderer build missing" && exit 1)
          echo "Build output OK"

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [typecheck, test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          provenance: false
          push: false
          tags: aws-lens:ci
